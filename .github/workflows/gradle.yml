      - name: 타깃 서버 배포 실행 (진단 + 내부 설정만)
        shell: bash
        run: |
          set -Eeuo pipefail
      
          APP_DIR="/home/${{ secrets.SSH_TARGET_USER }}/iceapple/apps/place-service"
          RELEASES="$APP_DIR/releases"
          SHARED="$APP_DIR/shared"
          LOGS="$APP_DIR/logs"
          PIDS="$APP_DIR/pids"
          LOG_FILE="$LOGS/place-service.log"
          PID_FILE="$PIDS/app.pid"
      
          # 디렉토리 보장
          ssh iceapple "mkdir -p '$RELEASES' '$SHARED' '$LOGS' '$PIDS'"
      
          # 원격에서 실행 (asdf 초기화 + set -x + trap)
          ssh iceapple 'bash -lc "
            set -Eeuo pipefail
            set -x
            trap '\''echo \"❌ line \$LINENO: \${BASH_COMMAND} (exit \$?)\"'\'' ERR
      
            # asdf 초기화 (비로그인 SSH 대비)
            if [ -f \"\$HOME/.asdf/asdf.sh\" ]; then
              . \"\$HOME/.asdf/asdf.sh\"
            fi
            export PATH=\$HOME/.asdf/shims:\$HOME/.asdf/bin:\$PATH
      
            echo PATH=\$PATH
            command -v java || true
            java -version || true
      
            APP_DIR=\"'"$APP_DIR"'\"
            RELEASES=\"'"$RELEASES"'\"
            LOGS=\"'"$LOGS"'\"
            PIDS=\"'"$PIDS"'\"
            LOG_FILE=\"'"$LOG_FILE"'\"
            PID_FILE=\"'"$PID_FILE"'\"
      
            # 최신 JAR
            JAR_ON_SERVER=\$(ls -t \"\$RELEASES\"/*.jar | head -n 1)
            [ -n \"\$JAR_ON_SERVER\" ] || { echo \"❌ no jar in \$RELEASES\"; exit 1; }
            echo \"최신 JAR: \$JAR_ON_SERVER\"
      
            # 기존 프로세스 종료
            if [ -f \"\$PID_FILE\" ] && ps -p \$(cat \"\$PID_FILE\") >/dev/null 2>&1; then
              kill \$(cat \"\$PID_FILE\") || true
              sleep 3
              if ps -p \$(cat \"\$PID_FILE\") >/dev/null 2>&1 then
                kill -9 \$(cat \"\$PID_FILE\") || true
              fi
              rm -f \"\$PID_FILE\"
            else
              # JAR 파일명 기준으로 매칭을 좁히면 더 안전
              APP_BASENAME="$(basename "$JAR_ON_SERVER")"
              PIDS="$(pgrep -f "$APP_BASENAME" || true)"
              if [ -n "$PIDS" ]; then
                kill $PIDS || true
                sleep 3
                PIDS="$(pgrep -f "$APP_BASENAME" || true)"
                [ -n "$PIDS" ] && kill -9 $PIDS || true
              fi
            fi
      
            # 로그 파일 경로 쓰기 가능 확인
            touch \"\$LOG_FILE\" && chmod 664 \"\$LOG_FILE\"
      
            echo \"새 프로세스 시작...\"
            # ⛔ 외부 설정 경로 옵션 빼고 내부 application.properties만 사용해 먼저 띄움
            nohup java -jar \"\$JAR_ON_SERVER\" >> \"\$LOG_FILE\" 2>&1 &
      
            pid=\$!
            sleep 1
            if [ -n \"\$pid\" ] && ps -p \"\$pid\" >/dev/null 2>&1; then
              echo \"\$pid\" > \"\$PID_FILE\"
              echo \"✅ PID: \$(cat \"\$PID_FILE\")\"
              echo \"📜 최근 로그:\"
              tail -n 50 \"\$LOG_FILE\" || true
            else
              echo \"❌ 프로세스가 즉시 종료됨. 로그 하단:\"
              tail -n 100 \"\$LOG_FILE\" || true
              exit 1
            fi
          "'
          
  dependency-submission:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0
